<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - SEAP</title>
<link rel="icon" href="../img/logo.png" type="image/png">
<link rel="stylesheet" href="../style.css">


<style>
:root { --bg: #2d3e40; --green: #2ecc71; --card: #263537; }

select {
    background: #3d4e50;
    color: var(--green);
    border: 1px solid #555;
    width: 100%;
    padding: 5px;
    font-weight: bold;
}

.tech-item {
    background: #34495e;
    padding: 8px 15px;
    border-radius: 5px;
    margin: 5px;
    display: inline-flex;
}

.btn-del {
    background: none;
    border: none;
    color: #ff7675;
    cursor: pointer;
    margin-left: 10px;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    padding: 8px;
    background: #1e2a2b;
    border: 1px solid #555;
    color: white;
    border-radius: 4px;
}

.btn-add {
    background: var(--green);
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<!--  NAVBAR -->
    <div class="navbar">
        
        <div class="navbar-left">
            <img src="../img/logo.png" class="logo">

            <div>
                <div class="title-left">SEAP-PA</div>
                <div class="badge">SANTARÉM</div>
            </div>
        </div>

        <div class="navbar-center">
            SECRETARIA DE ESTADO DE<br>
            ADMINISTRAÇÃO PENITENCIÁRIA
        </div>

        <div class="navbar-right" onclick="irHome()"><img src="../img/casa.png" class="logo"></div>

    </div>    

<!-- CARD INFORMATIVOS -->
    <div class="conteudo">     
        <div class="comando-card">
            <div class="comando-header">
                <div class="left">
                    <div>
                        <div class="duty-officer">Importante</div>
                        <p>Informações importantes</p>
                    </div>
                </div>
            </div>
            <div class="comando-body">
                <h2>Calendário de Escala</h2>
                <table>
                    <thead>
                        <tr>
                            <th>DOM</th><th>SEG</th><th>TER</th><th>QUA</th><th>QUI</th><th>SEX</th><th>SAB</th>
                        </tr>
                    </thead>
                    <tbody id="editor-body"></tbody>
                </table>

                <br>
                <button class="btn-add" onclick="saveData()">SALVAR ESCALA</button></br></br>
            
                <h2>Equipe</h2>

                <div id="tech-list"></div>

                <div class="input-group">
                    <input type="text" id="t-name" placeholder="Nome">
                    <input type="text" id="t-phone" placeholder="Telefone">
                    <button class="btn-add" onclick="addTech()">Adicionar</button>
                </div>
            </div>
        </div>
    </div>   

<script src="../js/expandir-card.js"></script>
<script src="../js/page.js"></script>
<script>
    const SENHA_CORRETA = "tiseap";

    function validarAcesso() {
        const senha = prompt("Digite a senha:");
        if (senha === SENHA_CORRETA) {
            document.body.style.display = "block";
            carregarDados();
        } else {
            alert("Senha incorreta!");
            window.location.href = "ti.html";
        }
    }
window.onload = () => validarAcesso();
</script>
<script type="module" src="../js/firebase.js"></script>

</body>
</html>
