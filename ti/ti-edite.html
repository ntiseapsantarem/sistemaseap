<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - SEAP</title>
<link rel="icon" href="../img/logo.png" type="image/png">
<link rel="stylesheet" href="../style.css">


<style>
:root { --bg: #2d3e40; --green: #2ecc71; --card: #263537; }

select {
    background: #3d4e50;
    color: var(--green);
    border: 1px solid #555;
    width: 100%;
    padding: 5px;
    font-weight: bold;
}

.tech-item {
    background: #34495e;
    padding: 8px 15px;
    border-radius: 5px;
    margin: 5px;
    display: inline-flex;
}

.btn-del {
    background: none;
    border: none;
    color: #ff7675;
    cursor: pointer;
    margin-left: 10px;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    padding: 8px;
    background: #1e2a2b;
    border: 1px solid #555;
    color: white;
    border-radius: 4px;
}

.btn-add {
    background: var(--green);
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<!--  NAVBAR -->
    <div class="navbar">
        
        <div class="navbar-left">
            <img src="../img/logo.png" class="logo">

            <div>
                <div class="title-left">SEAP-PA</div>
                <div class="badge">SANTARÉM</div>
            </div>
        </div>

        <div class="navbar-center">
            SECRETARIA DE ESTADO DE<br>
            ADMINISTRAÇÃO PENITENCIÁRIA
        </div>

        <div class="navbar-right" onclick="irHome()"><img src="../img/casa.png" class="logo"></div>

    </div>    

<!-- CARD INFORMATIVOS -->
    <div class="div-geral">     
        
        <div class="card-expansivo" onclick="remoto()">
            <div class="card-expansivo-btn">
                <div class="left">
                    <div>
                        <div class="font-1-btn">AnyDesk</div>
                        <p>Lista para acesso remoto</p>
                    </div>
                </div>
            </div>
        </div>    

        <div class="card-expansivo">
            <div class="card-expansivo-btn">
                <div class="left">
                    <div>
                        <div class="font-1-btn">Escala</div>
                        <p>Clique para editar</p>
                    </div>
                </div>
            </div>
            <div class="card-expansivo-expansao">
                <h2>Calendário de Escala</h2>
                <table>
                    <thead>
                        <tr>
                            <th>DOM</th><th>SEG</th><th>TER</th><th>QUA</th><th>QUI</th><th>SEX</th><th>SAB</th>
                        </tr>
                    </thead>
                    <tbody id="editor-body"></tbody>
                </table>

                <br>
                <button class="btn-add" onclick="saveData()">SALVAR ESCALA</button></br></br>
            
                <h2>Equipe</h2>

                <div id="tech-list"></div>

                <div class="input-group">
                    <input type="text" id="t-name" placeholder="Nome">
                    <input type="text" id="t-phone" placeholder="Telefone">
                    <button class="btn-add" onclick="addTech()">Adicionar</button>
                </div>
            </div>
        </div>    

        <div class="card-expansivo">
            <div class="card-expansivo-btn">
                <div class="left">
                    <div>
                        <div class="font-1-btn">Adicionar AnyDesk</div>
                        <p>Clique para inserir</p>
                    </div>
                </div>
            </div>
            <div class="card-expansivo-expansao">
                <div class="input-group">
                    <input type="text" id="any-nome" placeholder="Nome">
                    <input type="text" id="any-id" placeholder="ID AnyDesk">
                    <button class="btn-add" onclick="addAny()">Adicionar</button>                  
                </div>
            </div>
        </div>

    </div>   

<script src="../js/expandir-card.js"></script>
<script src="../js/page.js"></script>

<button onclick="sair()">Sair</button>

<script type="module">
import { auth } from './firebase.js';
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// PROTEÇÃO DA PÁGINA
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "../login.html";
  }
});

// LOGOUT
window.sair = function() {
  signOut(auth).then(() => {
    window.location.href = "../login.html";
  });
}

</script>
<script type="module" src="../js/firebase.js"></script>

</body>
</html>
